<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>お問い合わせ | Comfy</title>
    <meta name="description" content="岡山市南区泉田のまつげエクステ・増毛エクステサロン Comfy へのご予約・お問い合わせページです。">
    <link rel="canonical" href="https://comfy.girly.jp/contact.html">
    <meta property="og:site_name" content="Comfy">
    <meta property="og:type" content="article">
    <meta property="og:title" content="お問い合わせ | Comfy">
    <meta property="og:description" content="施術内容、空き時間、初めてのご相談など、お気軽にお問い合わせください。">
    <meta property="og:url" content="https://comfy.girly.jp/contact.html">
    <meta property="og:image" content="https://comfy.girly.jp/assets/comfy-hero.jpg">
    <meta property="og:locale" content="ja_JP">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="お問い合わせ | Comfy">
    <meta name="twitter:description" content="施術内容、空き時間、初めてのご相談など、お気軽にお問い合わせください。">
    <meta name="twitter:image" content="https://comfy.girly.jp/assets/comfy-hero.jpg">
    <meta name="theme-color" content="#b9847a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="subpage">
    <header class="site-header sub-header is-scrolled" data-header>
      <a class="brand" href="index.html#top" aria-label="Comfy トップへ">
        <span class="brand-mark">Comfy</span>
        <span class="brand-place">Okayama Izumida</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="メニューを開く" aria-expanded="false" data-nav-toggle>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" data-nav>
        <a href="index.html#concept">コンセプト</a>
        <a href="index.html#menu">メニュー</a>
        <a href="index.html#flow">施術の流れ</a>
        <a href="index.html#faq">よくある質問</a>
        <a href="index.html#access">アクセス</a>
      </nav>
      <a class="header-cta" href="contact.html">予約・お問い合わせ</a>
    </header>

    <main>
      <section class="page-hero">
        <div class="section-heading section-heading-center">
          <span>Contact</span>
          <h1>ご予約・お問い合わせ</h1>
          <p>施術内容、空き時間、初めてのご相談など、お気軽にお問い合わせください。</p>
        </div>
      </section>

      <section class="contact-section">
        <div class="contact-layout">
          <div class="contact-panel">
            <h2>送信内容</h2>
            <p>入力後「メールで送信する」を押すと、メールアプリが開きます。内容をご確認のうえ送信してください。</p>
            <form class="contact-form" data-contact-form data-contact-email="info@comfy.girly.jp">
              <label>
                お名前
                <input type="text" name="お名前" autocomplete="name" required>
              </label>
              <label>
                メールアドレス
                <input type="email" name="メールアドレス" autocomplete="email" required>
              </label>
              <label>
                電話番号
                <input type="tel" name="電話番号" autocomplete="tel">
              </label>
              <label>
                ご希望メニュー
                <select name="ご希望メニュー">
                  <option value="">選択してください</option>
                  <option value="まつげエクステ">まつげエクステ</option>
                  <option value="まつげエクステ料金を見た">まつげエクステ料金を見た</option>
                  <option value="増毛エクステ">増毛エクステ</option>
                  <option value="増毛エクステンション価格表を見た">増毛エクステンション価格表を見た</option>
                  <option value="相談して決めたい">相談して決めたい</option>
                </select>
              </label>
              <label>
                ご希望日時・お問い合わせ内容
                <textarea name="お問い合わせ内容" rows="8" required placeholder="例：初めてのまつげエクステを相談したいです。希望日は5月20日の午前中です。"></textarea>
              </label>
              <button class="button button-primary form-button" type="submit">メールで送信する</button>
            </form>
          </div>

          <aside class="contact-info">
            <h2>Comfy</h2>
            <dl class="info-list">
              <div>
                <dt>住所</dt>
                <dd>岡山市南区泉田1丁目8-39</dd>
              </div>
              <div>
                <dt>営業時間</dt>
                <dd>10:00-22:00</dd>
              </div>
              <div>
                <dt>定休日</dt>
                <dd>毎週水曜日・不定休</dd>
              </div>
            </dl>
            <a class="button button-secondary contact-back" href="index.html#access">アクセスを見る</a>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="footer-brand">Comfy</p>
      <p>岡山市南区泉田 まつげエクステ・増毛エクステ</p>
      <p class="copyright">© Comfy All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
